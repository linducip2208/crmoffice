version: '3.9'

# Local/development docker-compose. For production use Forge / Ploi / Coolify.
# Run: docker compose up -d
# Then: docker compose exec app php artisan migrate --seed

services:
  app:
    image: serversideup/php:8.3-fpm-nginx
    container_name: crmoffice_app
    environment:
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION: "true"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      PHP_OPCACHE_ENABLE: "1"
      APP_NAME: crmoffice
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: crmoffice
      DB_USERNAME: crmoffice
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      SCOUT_DRIVER: meilisearch
      MEILISEARCH_HOST: http://meilisearch:7700
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    container_name: crmoffice_mysql
    environment:
      MYSQL_DATABASE: crmoffice
      MYSQL_USER: crmoffice
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crmoffice_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: crmoffice_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"

  queue-worker:
    image: serversideup/php:8.3-cli
    container_name: crmoffice_queue
    command: php artisan queue:work --tries=3 --timeout=60
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - redis
      - mysql

  scheduler:
    image: serversideup/php:8.3-cli
    container_name: crmoffice_scheduler
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - mysql

volumes:
  mysql_data:
  redis_data:
  meili_data:

# ============================================================
# crmoffice — Production Nginx Configuration
# Target: Ubuntu 22.04 / 24.04 with PHP 8.3-FPM
# ============================================================
# Deploy:
#   cp deploy/nginx.conf /etc/nginx/sites-available/crmoffice
#   ln -s /etc/nginx/sites-available/crmoffice /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# ============================================================

# Rate limiting zone — 10 req/s per IP for /admin/login
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=10r/s;

# Redirect www → non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.yourdomain.com;
    return 301 http://yourdomain.com$request_uri;
}

# ---- HTTP server (redirect to HTTPS in production via certbot) ----
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    root /var/www/crmoffice/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        application/ld+json
        application/manifest+json
        image/svg+xml
        font/woff2
        font/woff
        font/ttf
        font/eot;

    # ---- Browser caching ----
    # Fonts & images — 1 year
    location ~* \.(?:jpg|jpeg|gif|png|ico|webp|avif|svg|svgz|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CSS & JS (content-hash filenames) — 1 month
    location ~* \.(?:css|js)$ {
        expires 1M;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- Block sensitive files ----
    location ~ /\.env {
        deny all;
        return 404;
    }

    location ~ /\.git {
        deny all;
        return 404;
    }

    location ~ ^/(vendor|node_modules)/ {
        deny all;
        return 404;
    }

    location ~ ^/storage/framework/cache/data/.*\.php$ {
        deny all;
        return 404;
    }

    location = /composer.json { deny all; return 404; }
    location = /composer.lock { deny all; return 404; }
    location = /package.json { deny all; return 404; }
    location = /package-lock.json { deny all; return 404; }
    location = /artisan { deny all; return 404; }

    # ---- Rate-limited admin login ----
    location = /admin/login {
        limit_req zone=admin_login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param HTTPS off;
    }

    # ---- Main application ----
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- PHP-FPM ----
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS off;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ---- Health check — no access log noise ----
    location = /healthz {
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- Logs ----
    access_log /var/log/nginx/crmoffice-access.log;
    error_log /var/log/nginx/crmoffice-error.log warn;
}


<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#3b1769"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#6366f1" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Soft brand glows -->
  <circle cx="160" cy="180" r="280" fill="url(#glow1)"/>
  <circle cx="1050" cy="500" r="320" fill="url(#glow2)"/>

  <!-- Top-left brand mark -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#logoGrad)"/>
    <text x="28" y="42" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle">c</text>
    <text x="74" y="38" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#ffffff">crmoffice</text>
    <text x="74" y="58" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#a5b4fc" letter-spacing="2">SELF-HOSTABLE BUSINESS CRM</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 230)">
    <text font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1.2">
      <tspan x="0" y="0">Bisnis kamu</tspan>
      <tspan x="0" y="85">jangan tergantung</tspan>
      <tspan x="0" y="170" fill="url(#brand)">Excel lagi.</tspan>
    </text>
  </g>

  <!-- Sub-copy -->
  <text x="80" y="500" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">
    Clients · Leads · Invoices · Projects · Tickets — satu suite.
  </text>
  <text x="80" y="530" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#cbd5e1">
    Laravel 13.7 + Filament 5. BYO integrations. MIT license.
  </text>

  <!-- Bottom-right CTA pill -->
  <g transform="translate(900, 540)">
    <rect x="0" y="0" width="220" height="48" rx="24" fill="#ffffff"/>
    <text x="110" y="30" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Coba demo →</text>
  </g>

  <!-- Bottom-left version tag -->
  <g transform="translate(80, 570)">
    <rect x="0" y="-2" width="14" height="14" rx="7" fill="#34d399"/>
    <text x="22" y="10" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#94a3b8">v0.1 · MVP</text>
  </g>
</svg>
